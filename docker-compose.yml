networks:
  leet-pi-net:


volumes:
  pgdata:
  backend_node_modules:


services:
  code-judge:
    build:
      context: ./juez-codigo
      target: dev
    ports:
      - "5000:5000"
    volumes:
      - ./juez-codigo:/app # hot-reload del código Python
      - ${CODE_JUDGE_TESTS_PATH}:/tests
    restart: unless-stopped
    networks:
      - leet-pi-net
    healthcheck:
      # python:3.10-slim no incluye curl/wget; usamos python directamente
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-leetpi_db}
      TZ: America/Argentina/Buenos_Aires
      PGTZ: America/Argentina/Buenos_Aires
    command: postgres -c timezone=America/Argentina/Buenos_Aires
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - leet-pi-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-leetpi_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  db-backup:
    build:
      context: ./db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DB_NAME:-leetpi_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      SCHEDULE: "0 6 * * *"
    volumes:
      - ${DB_BACKUPS_PATH}:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - leet-pi-net

  back-end:
    build:
      context: ./back-end
      target: dev
    env_file: ./back-end/.env
    environment:
      # Sobrescribe para apuntar a los servicios internos de Docker
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-leetpi_db}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CODE_JUDGE_URL: http://code-judge:5000
      OPENAPI_PATH: /docs/openapi.yaml
    ports:
      - "${PORT:-8081}:3001"
    depends_on:
      db:
        condition: service_healthy
      code-judge:
        condition: service_healthy
    volumes:
      - ./back-end/src:/app/src # hot-reload del código TS
      - ./docs:/docs:ro
      - ./back-end/scripts:/app/scripts:ro
      - backend_node_modules:/app/node_modules # preserva node_modules de la imagen
      - ${BACKEND_LOGS_PATH}:/app/logs
      - ${DB_BACKUPS_PATH}:/backups
    restart: unless-stopped
    networks:
      - leet-pi-net

  front-end:
    build:
      context: ./front-end
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE}
        VITE_AUTH0_REDIRECT_URI: ${VITE_AUTH0_REDIRECT_URI:-http://localhost:8080/callback}
        VITE_APP_NAME: ${VITE_APP_NAME:-Leet PI}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
    ports:
      - "8080:80"
    depends_on:
      - back-end
    restart: unless-stopped
    networks:
      - leet-pi-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
